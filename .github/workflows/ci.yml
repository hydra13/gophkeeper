name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOIMPORTS_VERSION: v0.39.0
  GOLANGCI_LINT_VERSION: v2.11.3
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.6.1

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@${{ env.GOIMPORTS_VERSION }}
      - name: Check formatting
        run: |
          OUTPUT=$(git ls-files '*.go' ':!:*.pb.go' ':!:*_grpc.pb.go' | xargs goimports -l)
          if [ -n "$OUTPUT" ]; then
            echo "Files need formatting:"
            echo "$OUTPUT"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Generate protobuf stubs
        run: make proto-check
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Generate protobuf stubs
        run: make proto-check
      - name: Run unit tests
        run: make test-unit

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Generate protobuf stubs
        run: make proto-check
      - name: Start integration dependencies
        run: make dev-up
      - name: Run integration tests
        env:
          GK_TEST_DATABASE_DSN: postgres://postgres:postgres@localhost:5432/gophkeeper?sslmode=disable
          GK_TEST_MINIO_ENDPOINT: http://localhost:9000
          GK_TEST_MINIO_BUCKET: gophkeeper-dev
          GK_TEST_MINIO_ACCESS_KEY: minioadmin
          GK_TEST_MINIO_SECRET_KEY: minioadmin
          GK_TEST_MINIO_REGION: us-east-1
        run: make test-integration
      - name: Stop integration dependencies
        if: always()
        run: make dev-down

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Generate protobuf stubs
        run: make proto-check
      - name: Run e2e tests
        run: make test-e2e

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Generate protobuf stubs
        run: make proto-check
      - name: Install bc (for cover-check)
        run: sudo apt-get update && sudo apt-get install -y bc
      - name: Run coverage gate
        run: make cover-check

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Check proto compilation
        run: make proto-check

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install protobuf toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}
      - name: Generate protobuf stubs
        run: make proto-check
      - name: Build CLI client
        run: go build -o bin/gophkeeper ./cmd/client/cli
      - name: Smoke test
        run: |
          OUTPUT=$(./bin/gophkeeper version 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "gophkeeper-cli"
