services:
  postgres:
    image: postgres:15-alpine
    container_name: gophkeeper-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gophkeeper
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./.db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gophkeeper"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: gophkeeper-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    profiles:
      - init
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do sleep 1; done
        mc mb --ignore-existing local/gophkeeper-dev
