version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
  exclusions:
    rules:
      - path: _grpc\.pb\.go
        linters:
          - govet
          - errcheck
          - staticcheck
          - ineffassign

formatters:
  enable:
    - gofmt
    - goimports
