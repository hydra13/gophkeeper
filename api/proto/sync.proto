syntax = "proto3";

package sync;

option go_package = "gophkeeper/api/proto/sync";

service SyncService {
  rpc Sync(SyncRequest) returns (SyncResponse);
}

message SyncRequest {
  int64 user_id = 1;
  string since = 2;
}

message SyncResponse {
  repeated SyncRecord records = 1;
}

message SyncRecord {
  int64 id = 1;
  int64 user_id = 2;
  string data_type = 3;
  int64 data_id = 4;
  int64 version = 5;
  bool deleted = 6;
  string created_at = 7;
  string updated_at = 8;
}
